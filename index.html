<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIVERSE</title>
<link rel="stylesheet" href="style.css">
<style>
.hero h1{
  color: #00ffcc;
  text-shadow: 0 0 8px #00ffcc;
}
  .menu-btn{
  color: #00ffcc;
  text-shadow: 0 0 6px #00ffcc;
  }
/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#000000,#111111);
  color:white; 
  padding-top:70px;
}
  body{
  overflow-x:hidden;
  }

/* ===== HEADER ===== */
.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background: #08142b;
  z-index:3000;
  box-sizing:border-box;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.account{
  font-size:22px;
  cursor:pointer;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:280px;
  height:100%;
  background:#0b1a35;
  padding:30px 20px;
  box-shadow:5px 0 25px rgba(0,0,0,0.4);
  z-index:2000;

  transform:translateX(-100%);
  transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);
}

.sidebar.active{
  transform:translateX(0);
                                          }

.sidebar h2{
  color:white;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#cbd5e1;
  text-decoration:none;
  padding:12px 0;
  font-size:16px;
  transition:0.2s;
}

.sidebar a:hover{
  color:#60a5fa;
  padding-left:8px;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:1500;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:30px 20px 20px;
}

.hero h1{
  font-size:28px;
  margin:0;
}

.hero p{
  margin-top:8px;
  font-size:14px;
  opacity:0.7;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  padding:15px 0;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:13px;
  color:#2c3e70;
  text-align:center;
}

.nav-item span{
  font-size:22px;
  margin-bottom:4px;
}

.nav-item:hover{
  transform:translateY(-2px);
  opacity:0.8;
}

/* ===== SECTION ===== */
.section{
  padding:20px;
}

.section h3{
  margin-bottom:15px;
  color: #00ffcc;
}

/* ===== GRID ===== */
.novel-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.cover{
  width:100%;
  height:170px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.novel-title{
  font-size:13px;
  margin-top:6px;
  font-weight:600;
}

.novel-info{
  font-size:11px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Menu</h2>
  <a href="#">Home</a>
  <a href="#">Bookmark</a>
  <a href="#">All Story</a>
  <a href="#">Setting</a>
  <a href="#">Contact</a>
</div>

<div class="overlay"></div>

<!-- HEADER -->
<div class="top-header">
  <div class="menu-btn">☰ OMNIVERSEREader</div>
  <div class="account">👤</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>🌌 OMNIVERSE</h1>
  <p>story world</p>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item"><span>🏠</span>Home</div>
  <div class="nav-item"><span>📚</span>Genre</div>
  <div class="nav-item"><span>⬆️</span>Update</div>
  <div class="nav-item"><span>🕒</span>Recently</div>
  <div class="nav-item"><span>🔍</span>Search</div>
</div>

<!-- NEW UPDATE -->
<div class="section">
  <h3>New Update</h3>
  <div class="novel-grid">
    <div>
      <a href="novel1.html" class="novel-card">
  <img src="cover1.jpg" class="cover">
  <div class="novel-title">The Last Mage</div>
  <div class="novel-info">Fantasy • 12 Ch</div>
      </a>="novel-info">Fantasy • 12 Ch</div>
    </div>
  </div>
</div>

<!-- ALL STORY -->
<div class="section">
  <h3>All Story</h3>
  <div class="novel-grid">
    <div>
      <img src="cover2.jpg" class="cover">
      <div class="novel-title">Shadow Rebirth</div>
      <div class="novel-info">Dark Fantasy</div>
    </div>
  </div>
</div>

<script>
const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");
const overlay = document.querySelector(".overlay");

menuBtn.addEventListener("click", () => {
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
});

overlay.addEventListener("click", () => {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
});
</script>

</body>
  </html>
