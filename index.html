<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIVERSE</title>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#eaf2ff,#f7faff);
  color:#1a2a4f;
  padding-top:70px;
}

/* ===== HEADER (STICKY) ===== */
.top-header{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background: linear-gradient(180deg,#eaf2ff,#dfeaff);
  z-index:1000;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.logo-small{
  font-weight:600;
}

.account{
  font-size:18px;
  cursor:pointer;
}

/* ===== HERO TITLE ===== */
.hero{
  text-align:center;
  padding:30px 20px 20px;
}

.hero h1{
  font-size:28px;
  margin:0;
}

.hero p{
  margin-top:8px;
  font-size:14px;
  opacity:0.7;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:center;   /* INI YANG BIKIN RATA TENGAH */
  gap:18px;
  padding:12px 20px;
  background: transparent;  /* HAPUS PUTIH */
  border:none;              /* HAPUS GARIS */
  };
}

.nav-item{
  flex:0 0 auto;
  text-align:center;
  font-size:10px;
  color:#3b5ed7;
  cursor:pointer;
  transition:0.2s;
}

.nav-item:hover{
  transform:translateY(-2px);
  opacity:0.8;
  }

/* ===== SECTION ===== */
.section{
  padding:20px;
}

.section h3{
  margin-bottom:15px;
}

/* ===== GRID ===== */
.novel-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.cover{
  width:100%;
  height:170px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.novel-title{
  font-size:13px;
  margin-top:6px;
  font-weight:600;
}

.novel-info{
  font-size:11px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top-header">
  <div class="menu-btn">☰ OMNIVERSEreader</div>
  <div class="account">👤</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>🌌OMNIVERSE</h1>
  <p>story world</p>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item"><span>🏠</span>Home</div>
  <div class="nav-item"><span>📚</span>Genre</div>
  <div class="nav-item"><span>⬆️</span>Update</div>
  <div class="nav-item"><span>🕒</span>Recently</div>
  <div class="nav-item"><span>🔎</span>Search</div>
</div>

<!-- NEW UPDATE -->
<div class="section">
  <h3>New Update</h3>
  <div class="novel-grid">
    <div>
      <img src="cover1.jpg" class="cover">
      <div class="novel-title">The Last Mage</div>
      <div class="novel-info">Fantasy • 12 Ch</div>
    </div>
  </div>
</div>

<!-- ALL STORY -->
<div class="section">
  <h3>All Story</h3>
  <div class="novel-grid">
    <div>
      <img src="cover2.jpg" class="cover">
      <div class="novel-title">Shadow Rebirth</div>
      <div class="novel-info">Dark Fantasy</div>
    </div>
  </div>
</div>

</body>
</html>
