<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIVERSE</title>

<style>
.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#dbeafe;
  z-index:3000; /* harus di atas overlay */
  }
.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:280px;
  height:100vh;
  background:#0b1a35; /* biru gelap fantasy */
  padding:30px 20px;
  transition:0.3s ease;
  z-index:2000;
  box-shadow:5px 0 25px rgba(0,0,0,0.4);
}

.sidebar.active{
  left:0;
}

.sidebar h2{
  color:white;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#cbd5e1;
  text-decoration:none;
  padding:12px 0;
  font-size:16px;
}

.sidebar a:hover{
  color:#60a5fa;
  padding-left:8px;
  transition:0.2s;
  }
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:12px 0;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:1500;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}
/* ===== BODY ===== */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#eaf2ff,#f7faff);
  color:#1a2a4f;
  padding-top:70px;
}

/* ===== HEADER (STICKY) ===== */
.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#dbeafe;
  z-index:3000; /* harus di atas overlay */
  }

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.account{
  font-size:22px;
  cursor:pointer;
  }
/* ===== HERO TITLE ===== */
.hero{
  text-align:center;
  padding:30px 20px 20px;
}

.hero h1{
  font-size:28px;
  margin:0;
}

.hero p{
  margin-top:8px;
  font-size:14px;
  opacity:0.7;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  padding:15px 0;
  }

.nav-item{
  display:flex;
  flex-direction:column; /* icon atas teks */
  align-items:center;
  font-size:13px;
  color:#2c3e70;
  text-align:center;
  }
  
  .nav-item span{
  font-size:22px;
  margin-bottom:4px;
  line-height:1;
  }

.nav-item:hover{
  transform:translateY(-2px);
  opacity:0.8;
  }

/* ===== SECTION ===== */
.section{
  padding:20px;
}

.section h3{
  margin-bottom:15px;
}

/* ===== GRID ===== */
.novel-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.cover{
  width:100%;
  height:170px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.novel-title{
  font-size:13px;
  margin-top:6px;
  font-weight:600;
}

.novel-info{
  font-size:11px;
  opacity:0.6;
}

</style>
</head>

<body>
<div class="sidebar" id="sidebar">
  <h2>Menu</h2>
  <a href="#">Home</a>
  <a href="#">Bookmark</a>
  <a href="#">All Story</a>
  <a href="#">Setting</a>
  <a href="#">Contact</a>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<!-- HEADER -->
<div class="top-header">
<div class="menu-btn" onclick="openSidebar()">☰ OMNIVERSEREader</div>
<div class="account">👤</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>🌌OMNIVERSE</h1>
  <p>story world</p>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item">
    <span>🏠</span>
    Home
  </div>

  <div class="nav-item">
    <span>📚</span>
    Genre
  </div>

  <div class="nav-item">
    <span>⬆️</span>
    Update
  </div>

  <div class="nav-item">
    <span>🕒</span>
    Recently
  </div>

  <div class="nav-item">
    <span>🔍</span>
    Search
  </div>
</div>

<!-- NEW UPDATE -->
<div class="section">
  <h3>New Update</h3>
  <div class="novel-grid">
    <div>
      <img src="cover1.jpg" class="cover">
      <div class="novel-title">The Last Mage</div>
      <div class="novel-info">Fantasy • 12 Ch</div>
    </div>
  </div>
</div>

<!-- ALL STORY -->
<div class="section">
  <h3>All Story</h3>
  <div class="novel-grid">
    <div>
      <img src="cover2.jpg" class="cover">
      <div class="novel-title">Shadow Rebirth</div>
      <div class="novel-info">Dark Fantasy</div>
    </div>
  </div>
</div>
<script>
function openSidebar(){
  document.getElementById("sidebar").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
</script>
</body>
</html>
